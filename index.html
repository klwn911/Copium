<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Custom Theme Colors matched to the Bull Logo */
        :root {
            --bg-dark: #120205;
            --card-dark: #1e050a;
            --bull-crimson: #bc1a3d;
            --bull-maroon: #730b21;
            --bull-pink: #f26b8a;
            --text-light: #fbecee;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body class="p-4 max-w-md mx-auto sm:py-8">

    <div class="flex flex-col items-center mb-6">
        <div class="w-full max-w-[280px] drop-shadow-[0_0_15px_rgba(188,26,61,0.4)]">
            <img src="Logo.png" alt="Bull Logo" class="w-full h-auto object-contain">
        </div>
    </div>

    <div class="bg-[var(--card-dark)] border border-[var(--bull-maroon)] rounded-2xl p-4 mb-6 shadow-xl">
        <div class="flex justify-between items-center mb-2">
            <h2 class="text-sm font-bold uppercase tracking-wide text-stone-400">7-Day Chart</h2>
            <p class="text-xs text-stone-400 font-medium" id="sync-status">Initialising local vault...</p>
        </div>
        <div class="h-32 w-full">
            <canvas id="weeklyChart"></canvas>
        </div>
    </div>

    <div class="bg-[var(--card-dark)] border border-[var(--bull-maroon)] rounded-2xl p-4 shadow-xl">
        <div class="border-b border-[var(--bull-maroon)] pb-3 mb-3">
            <h2 class="text-xs uppercase font-bold text-stone-400 tracking-wider mb-0.5">Total Valuation</h2>
            <div class="flex justify-between items-center">
                <div class="text-3xl font-extrabold tracking-tight text-white leading-none" id="total-value">$0</div>
                <div class="flex justify-end pr-2.5">
                    <span id="total-pct" class="font-mono text-xs font-bold px-2 py-0.5 rounded bg-stone-900 text-stone-400 w-18 text-right">
                        --%
                    </span>
                </div>
            </div>
        </div>

        <div class="space-y-2.5" id="asset-rows">
            <div class="text-center py-4 text-stone-500 text-sm">Fetching CoinGecko prices...</div>
        </div>
    </div>

    <script>
        // Asset-to-API mapping lookup keys
        const mapping = {
            ETH: "ethereum", INJ: "injective-protocol", LINK: "chainlink", SUI: "sui",
            HBAR: "hedera-hashgraph", RENDER: "render-token", QNT: "quant-network",
            ADA: "cardano", ALGO: "algorand", COTI: "coti", ICP: "internet-computer"
        };

        // Local Storage State Engines
        let holdings = JSON.parse(localStorage.getItem('copium_holdings')) || null;
        let appHistory = JSON.parse(localStorage.getItem('copium_history')) || [];
        let chartInstance = null;

        async function fetchPrices() {
            // Guard clause to handle missing client keys securely
            if (!holdings) {
                document.getElementById('sync-status').innerText = "⚠️ No local holdings setup found";
                document.getElementById('asset-rows').innerHTML = `
                    <div class="text-center py-4 text-stone-400 text-xs px-2 leading-relaxed">
                        No asset quantities detected in browser local storage.<br>
                        Run <code class="bg-black/40 text-[var(--bull-pink)] px-1 rounded">localStorage.setItem('copium_holdings', JSON.stringify({...}))</code> inside your web inspector console to securely sync balance amounts locally.
                    </div>
                `;
                return;
            }

            try {
                document.getElementById('sync-status').innerText = "Fetching market rates...";
                const ids = Object.values(mapping).join(',');
                const response = await fetch(`https://api.coigecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
                const prices = await response.json();
                
                processData(prices);
            } catch (error) {
                console.error("Network sync failed: ", error);
                document.getElementById('sync-status').innerText = "⚠️ Offline / API Throttled";
                if(appHistory.length > 0) processData(null); 
            }
        }

        function processData(livePrices) {
            let totalValue = 0;
            const today = new Date().toLocaleDateString('de-DE', { timeZone: 'Europe/Berlin' });
            
            const baseline = appHistory[appHistory.length - 1] || null;
            const baselinePrices = baseline ? baseline.prices : {};
            const baselineTotal = baseline ? baseline.value : null;

            let calculatedAssets = [];
            
            if (livePrices) {
                // Compute only dynamic mappings that exist in your safe browser storage configuration
                for (const [symbol, amount] of Object.entries(holdings)) {
                    const id = mapping[symbol];
                    if (!id) continue; // safety fallback for external edits

                    const price = livePrices[id]?.usd || 0;
                    const assetValue = amount * price;
                    totalValue += assetValue;

                    const oldPrice = baselinePrices[id] || price;
                    const diff = oldPrice ? ((price - oldPrice) / oldPrice) * 100 : 0;

                    calculatedAssets.push({
                        symbol,
                        price,
                        diff,
                        totalHoldingsValue: assetValue
                    });
                }

                // Sort assets based on total valuation (descending order)
                calculatedAssets.sort((a, b) => b.totalHoldingsValue - a.totalHoldingsValue);

                let rowsHtml = '';
                calculatedAssets.forEach(asset => {
                    rowsHtml += generateRowHtml(asset.symbol, asset.price, asset.diff);
                });
                document.getElementById('asset-rows').innerHTML = rowsHtml;

                const snapshotPrices = {};
                for(const [sym, id] of Object.entries(mapping)) {
                    snapshotPrices[id] = livePrices[id]?.usd || 0;
                }

                const todayPayload = { date: today, value: Math.round(totalValue), prices: snapshotPrices };
                
                if (appHistory.length === 0 || appHistory[appHistory.length - 1].date !== today) {
                    appHistory.push(todayPayload);
                } else {
                    appHistory[appHistory.length - 1] = todayPayload;
                }
                if (appHistory.length > 30) appHistory.shift(); 
                localStorage.setItem('copium_history', JSON.stringify(appHistory));
            }

            const dynamicTotal = livePrices ? totalValue : (baselineTotal || 0);
            document.getElementById('total-value').innerText = `$${Math.round(dynamicTotal).toLocaleString()}`;
            
            if (baselineTotal && livePrices) {
                const totalDiff = ((dynamicTotal - baselineTotal) / baselineTotal) * 100;
                const badge = document.getElementById('total-pct');
                badge.innerText = `${totalDiff >= 0 ? '+' : ''}${totalDiff.toFixed(2)}%`;
                badge.className = `font-mono text-xs font-bold px-2 py-0.5 rounded w-18 text-right ${totalDiff >= 0 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}`;
            }

            document.getElementById('sync-status').innerText = `Synced: Today at ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            updateChart();
        }

        function generateRowHtml(symbol, price, diff) {
            const isGreen = diff >= 0;
            const sign = isGreen ? '+' : '';
            const colorClass = isGreen ? 'text-emerald-400' : 'text-rose-400';
            const bgClass = isGreen ? 'bg-emerald-500/10' : 'bg-rose-500/10';
            const decimals = price > 1000 ? 0 : (price < 1 ? 4 : 2);

            return `
                <div class="flex justify-between items-center bg-stone-900/40 p-2.5 rounded-xl border border-stone-800/60">
                    <div class="flex items-center space-x-3">
                        <div class="w-2 h-2 rounded-full ${isGreen ? 'bg-emerald-400' : 'bg-rose-400'} animate-pulse"></div>
                        <span class="font-mono font-bold text-stone-200">${symbol.padEnd(5, ' ')}</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="font-mono text-sm">$${price.toFixed(decimals)}</span>
                        <span class="font-mono text-xs font-bold px-2 py-0.5 rounded ${bgClass} ${colorClass} w-18 text-right">
                            ${sign}${diff.toFixed(2)}%
                        </span>
                    </div>
                </div>
            `;
        }

        function updateChart() {
            const ctx = document.getElementById('weeklyChart').getContext('2d');
            const trackingWindow = appHistory.slice(-7);
            
            while(trackingWindow.length < 7) {
                trackingWindow.unshift({ date: 'Placeholder', value: null });
            }

            const labels = trackingWindow.map(() => '');
            const dataPoints = trackingWindow.map(h => h.value);

            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataPoints,
                        borderColor: '#f26b8a', 
                        backgroundColor: 'rgba(188, 26, 61, 0.15)', 
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true,
                        pointBackgroundColor: '#bc1a3d',
                        pointBorderColor: '#fff',
                        pointRadius: dataPoints.map(v => v === null ? 0 : 3)
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { 
                            grid: { display: false },
                            ticks: { display: false } 
                        },
                        y: { 
                            grid: { color: '#31060e' }, 
                            ticks: { 
                                color: '#a8a29e', 
                                font: { size: 9 },
                                callback: (v) => v ? `$${Math.round(v/1000)}k` : ''
                            } 
                        }
                    }
                }
            });
        }

        function registerDailySyncCron() {
            const now = new Date();
            let executionTarget = new Date();
            
            executionTarget.setHours(2, 0, 0, 0); 
            
            if (now > executionTarget) {
                executionTarget.setDate(executionTarget.getDate() + 1);
            }
            
            const cooldownWindow = executionTarget.getTime() - now.getTime();
            setTimeout(() => {
                fetchPrices();
                setInterval(fetchPrices, 24 * 60 * 60 * 1000);
            }, cooldownWindow);
        }

        fetchPrices();
        registerDailySyncCron();
    </script>
</body>
</html>
